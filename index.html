<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Directory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f8;
      color: #222;
      padding: 16px;
    }

    .page-header {
      max-width: 800px;
      margin: 0 auto 20px auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .updated {
      font-size: 0.78rem;
      color: #888;
      margin-top: 4px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .group-block {
      margin-bottom: 24px;
    }

    .group-header {
      background: #1a73e8;
      color: #fff;
      padding: 9px 14px;
      border-radius: 8px 8px 0 0;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .group-body {
      border: 1px solid #dde3ec;
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      background: #fff;
    }

    .item {
      padding: 11px 14px;
      border-bottom: 1px solid #f0f2f5;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .item-description {
      font-size: 0.83rem;
      color: #555;
      margin-top: 3px;
      line-height: 1.4;
    }

    .item-contact {
      font-size: 0.80rem;
      color: #1a73e8;
      margin-top: 4px;
      word-break: break-all;
    }

    .item-contact a {
      color: #1a73e8;
      text-decoration: none;
    }

    .item-contact a:hover {
      text-decoration: underline;
    }

    #loading {
      text-align: center;
      color: #888;
      padding: 48px 16px;
      font-size: 0.9rem;
    }

    #error {
      text-align: center;
      color: #c0392b;
      padding: 48px 16px;
      font-size: 0.9rem;
      display: none;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      body { padding: 12px; }
      h1   { font-size: 1.25rem; }
      .group-header { font-size: 0.9rem; padding: 8px 12px; }
      .item { padding: 10px 12px; }
      .item-name { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Volunteer Directory</h1>
    <div class="updated" id="updated"></div>
  </div>

  <div class="container">
    <div id="loading">Loading directory...</div>
    <div id="error">Unable to load data. Please try again later.</div>
    <div id="content"></div>
  </div>

  <script>
    // ── Column name constants — must match keys in data.json exactly ──
    const GROUP_BY  = "Category";     // column used to create group headings
    const SORT_BY   = "Name";         // column used to sort within each group
    const COL_NAME  = "Name";         // primary bold label on each card
    const COL_DESC  = "Description";  // second line — descriptive text
    const COL_CONT  = "Contact";      // third line — shown as a mailto link
    // ─────────────────────────────────────────────────────────────────

    fetch('data.json')
      .then(function(response) {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(function(json) {
        document.getElementById('loading').remove();

        // Show last updated timestamp if present
        if (json.updated) {
          document.getElementById('updated').textContent =
            'Last updated: ' + json.updated;
        }

        const records = json.records || json;

        if (!records || records.length === 0) {
          document.getElementById('content').innerHTML =
            '<p style="color:#888;text-align:center;padding:32px">No records found.</p>';
          return;
        }

        // Group records by GROUP_BY column
        const groups = {};
        records.forEach(function(r) {
          const groupKey = r[GROUP_BY] || 'Uncategorised';
          if (!groups[groupKey]) groups[groupKey] = [];
          groups[groupKey].push(r);
        });

        // Sort group names A→Z, then sort records within each group by SORT_BY
        const sortedGroupNames = Object.keys(groups).sort();

        sortedGroupNames.forEach(function(groupName) {
          const items = groups[groupName].sort(function(a, b) {
            return (a[SORT_BY] || '').localeCompare(b[SORT_BY] || '');
          });

          // Build group block HTML
          const itemsHTML = items.map(function(r) {
            const contact = r[COL_CONT] || '';
            const contactHTML = contact
              ? '<div class="item-contact"><a href="mailto:' +
                contact + '">' + contact + '</a></div>'
              : '';

            return '<div class="item">' +
              '<div class="item-name">'        + (r[COL_NAME] || '') + '</div>' +
              '<div class="item-description">' + (r[COL_DESC] || '') + '</div>' +
              contactHTML +
              '</div>';
          }).join('');

          const groupHTML =
            '<div class="group-block">' +
              '<div class="group-header">' + groupName + '</div>' +
              '<div class="group-body">' + itemsHTML + '</div>' +
            '</div>';

          document.getElementById('content')
            .insertAdjacentHTML('beforeend', groupHTML);
        });
      })
      .catch(function(err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display   = 'block';
        console.error('Failed to load data.json:', err);
      });
  </script>

</body>
</html>
